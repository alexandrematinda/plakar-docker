name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plakar version (e.g., 1.0.6)"
        required: true
      plakar_uid:
        description: "Container user UID (default: 1000)"
        required: false
        default: "1000"
      plakar_gid:
        description: "Container user GID (default: 1000)"
        required: false
        default: "1000"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - ".buildargs"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            echo "VERSION=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "VERSION=1.0.6" >> $GITHUB_OUTPUT
          fi

      - name: Load build args from .buildargs
        id: buildargs
        run: |
          if [ -f .buildargs ]; then
            grep "^PLAKAR_UID=" .buildargs | cut -d= -f2 | xargs -I {} echo "uid={}" >> $GITHUB_OUTPUT
            grep "^PLAKAR_GID=" .buildargs | cut -d= -f2 | xargs -I {} echo "gid={}" >> $GITHUB_OUTPUT
          else
            echo "uid=1000" >> $GITHUB_OUTPUT
            echo "gid=1000" >> $GITHUB_OUTPUT
          fi

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            PLAKAR_UID=${{ github.event.inputs.plakar_uid || steps.buildargs.outputs.uid }}
            PLAKAR_GID=${{ github.event.inputs.plakar_gid || steps.buildargs.outputs.gid }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/plakar-docker:v${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/plakar-docker:latest

      - name: Delete old package versions
        uses: actions/delete-package-versions@v4
        with:
          package-name: plakar-docker
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
