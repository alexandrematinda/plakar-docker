version: "3.8"

services:
  plakar-agent:
    image: ghcr.io/alexandrematinda/plakar-docker:latest
    container_name: plakar-agent
    restart: unless-stopped
    user: "${PLAKAR_UID:-1000}:${PLAKAR_GID:-1000}"
    env_file: .env
    volumes:
      - ${BACKUP_SOURCE}:/data:ro
      - ${PLAKAR_HOME}:/home/plakar/.plakar
    environment:
      - PLAKAR_PASSPHRASE=${PLAKAR_PASSPHRASE}
      - TZ=${TZ:-UTC}
    command: agent
    profiles: ["agent"]

  plakar-ui:
    image: ghcr.io/alexandrematinda/plakar-docker:latest
    container_name: plakar-ui
    restart: unless-stopped
    user: "${PLAKAR_UID:-1000}:${PLAKAR_GID:-1000}"
    env_file: .env
    ports:
      - "${PLAKAR_UI_PORT:-9000}:9000"
    volumes:
      - ${PLAKAR_HOME}:/home/plakar/.plakar
    environment:
      - TZ=${TZ:-UTC}
    command: ui --listen 0.0.0.0:9000
    profiles: ["ui"]
