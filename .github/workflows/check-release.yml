name: Check for New Plakar Release

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest stable plakar release
        id: plakar-release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/PlakarKorp/plakar/releases \
            | jq -r '[.[] | select(.prerelease == false)] | .[0].tag_name' \
            | sed 's/^v//')
          echo "VERSION=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest stable plakar: $LATEST"

      - name: Check if we need to build
        id: check
        env:
          PLAKAR_VERSION: ${{ steps.plakar-release.outputs.VERSION }}
        run: |
          if git show main:PLAKAR_VERSION 2>/dev/null | grep -q "^$PLAKAR_VERSION\$"; then
            echo "BUILD_NEEDED=false" >> $GITHUB_OUTPUT
            echo "Version $PLAKAR_VERSION already built"
          else
            echo "BUILD_NEEDED=true" >> $GITHUB_OUTPUT
            echo "Need to build version $PLAKAR_VERSION"
          fi

      - name: Trigger build workflow
        if: steps.check.outputs.BUILD_NEEDED == 'true'
        uses: actions/github-script@v7
        env:
          PLAKAR_VERSION: ${{ steps.plakar-release.outputs.VERSION }}
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main',
              inputs: {
                version: process.env.PLAKAR_VERSION
              }
            })
            console.log('Triggered build for version ' + process.env.PLAKAR_VERSION)

      - name: Update PLAKAR_VERSION file
        if: steps.check.outputs.BUILD_NEEDED == 'true'
        env:
          PLAKAR_VERSION: ${{ steps.plakar-release.outputs.VERSION }}
        run: |
          echo "$PLAKAR_VERSION" > PLAKAR_VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PLAKAR_VERSION
          git commit -m "chore: update PLAKAR_VERSION to $PLAKAR_VERSION"
          git push
