version: "3.8"

services:

  plakar-ui:
    image: ghcr.io/alexandrematinda/plakar-docker:latest
    container_name: plakar-ui
    restart: unless-stopped
    user: "${PLAKAR_UID:-1000}:${PLAKAR_GID:-1000}"
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "${PLAKAR_LOG_MAX_SIZE:-10m}"
        max-file: "${PLAKAR_LOG_MAX_FILE:-5}"
    ports:
      - "${PLAKAR_UI_PORT:-9000}:9000"
    volumes:
      - ${PLAKAR_HOME}:/home/plakar/.plakar
    environment:
      - TZ=${TZ:-UTC}
    command: ui -addr 0.0.0.0:9000 -no-spawn -no-auth
    deploy:
      resources:
        limits:
          memory: ${PLAKAR_UI_MEMORY_LIMIT:-512m}
        reservations:
          memory: ${PLAKAR_UI_MEMORY_RESERVE:-256m}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
