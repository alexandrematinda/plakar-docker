version: "3.8"

services:
  plakar-backup:
    image: ghcr.io/alexandrematinda/plakar-docker:latest
    container_name: plakar-backup
    restart: "no"
    user: "${PLAKAR_UID:-1000}:${PLAKAR_GID:-1000}"
    env_file: .env
    volumes:
      - ${BACKUP_SOURCE}:/data:ro
      - /volume1/plakar/kloset:/home/plakar/.plakar
    environment:
      - PLAKAR_PASSPHRASE=${PLAKAR_PASSPHRASE}
      - TZ=${TZ:-UTC}
    command: >
      backup
      --store "s3://${S3_ACCESS_KEY_ID}:${S3_SECRET_ACCESS_KEY}@${S3_ENDPOINT}/${S3_BUCKET}"
      /data

  plakar-ui:
    image: ghcr.io/alexandrematinda/plakar-docker:latest
    container_name: plakar-ui
    restart: unless-stopped
    user: "${PLAKAR_UID:-1000}:${PLAKAR_GID:-1000}"
    env_file: .env
    ports:
      - "${PLAKAR_UI_PORT:-9000}:9000"
    volumes:
      - /volume1/plakar/kloset:/home/plakar/.plakar
    environment:
      - TZ=${TZ:-UTC}
    command: ui --listen 0.0.0.0:9000
    profiles: ["ui"]
